<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Trang thông tin chính thức của ứng dụng GhiCa.">
  <title>GhiCa — Ghi doanh thu theo ca</title>
  <style>
    :root { color-scheme:light dark; --accent:#2563eb; --muted:#64748b; --card:#fff; --bg:#f8fafc; --text:#172033; --border:#e2e8f0; }
    @media (prefers-color-scheme:dark) { :root { --card:#111827; --bg:#0b1120; --text:#e5e7eb; --muted:#94a3b8; --border:#263244; } }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:min(680px,100%); padding:clamp(28px,7vw,60px); text-align:center; background:var(--card); border:1px solid var(--border); border-radius:28px; box-shadow:0 20px 60px rgba(15,23,42,.1); }
    .mark { width:72px; height:72px; display:grid; place-items:center; margin:0 auto 20px; border-radius:22px; background:linear-gradient(145deg,#3b82f6,#1d4ed8); color:#fff; font-size:32px; font-weight:800; }
    h1 { margin:0; font-size:clamp(38px,8vw,58px); line-height:1.1; } p { color:var(--muted); font-size:18px; }
    nav { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin-top:30px; } a { padding:12px 17px; border:1px solid var(--border); border-radius:12px; color:var(--accent); text-decoration:none; font-weight:650; }
    a.primary { color:white; background:var(--accent); border-color:var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">G</div>
    <h1>GhiCa</h1>
    <p>Ghi doanh thu theo ca — đơn giản, riêng tư và an toàn.</p>
    <nav aria-label="Liên kết GhiCa">
      <a class="primary" href="support.html">Hỗ trợ</a>
      <a href="privacy.html">Chính sách quyền riêng tư</a>
      <a href="mailto:linhchiao11@gmail.com">Email</a>
    </nav>
  </main>
</body>
</html>
